name: Bug report
description: Something broke
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.11.0"
    validations:
      required: true
  - type: input
    id: operation
    attributes:
      label: API operation
      description: Which client method? (e.g. createOrderV3, getRelations)
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened / what did you expect?
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: >
        Error name, message, faultCode/code/httpStatus if present.
        ⚠️ Scrub xmlRequest/xmlResponse and any real customer/order data before pasting.
      render: text
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      render: typescript
